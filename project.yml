name: Leo
options:
  bundleIdPrefix: com.kisoo
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"
targets:
  Leo:
    type: application
    platform: macOS
    sources:
      - path: Leo
    info:
      path: Leo/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Leo
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 Kisoo Kim"
    entitlements:
      path: Leo/Leo.entitlements
      properties:
        com.apple.security.app-sandbox: false
    dependencies:
      - package: HotKey
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kisoo.leo
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
  LeoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LeoTests
    dependencies:
      - target: Leo
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Leo.app/Contents/MacOS/Leo"
        GENERATE_INFOPLIST_FILE: YES
